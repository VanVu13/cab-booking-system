server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── SPA Routing ─────────────────────────────────────────────────────
    # All routes fall back to index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Reverse Proxy: API Gateway ──────────────────────────────────────
    location /api/ {
        proxy_pass http://api-gateway:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # ── WebSocket: Socket.IO ────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://api-gateway:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # ── WebSocket: Tracking ─────────────────────────────────────────────
    location /tracking-socket/ {
        proxy_pass http://api-gateway:3000/tracking-socket/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # ── WebSocket: Driver Service Direct ────────────────────────────────
    location /ws/ {
        proxy_pass http://driver-service:3004/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # ── Performance: Gzip Compression ───────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Caching: Static Assets ──────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
